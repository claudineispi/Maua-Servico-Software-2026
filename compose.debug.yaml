services:
  petcare-debug:
    image: petcare-api-debug
    build:
      context: ./petcare/backend
      dockerfile: Dockerfile
    command: >
      sh -c "pip install debugpy -t /tmp &&
             python /tmp/debugpy --wait-for-client --listen 0.0.0.0:5678
             -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "5678:5678"
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://petcare_user:petcare_secret@db:5432/petcare
      ENVIRONMENT: development
    volumes:
      - ./petcare/backend:/app
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: petcare
      POSTGRES_USER: petcare_user
      POSTGRES_PASSWORD: petcare_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petcare_user -d petcare"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    name: petcare_pgdata
