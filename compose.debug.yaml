services:
  mauaservicosoftware2026:
    image: mauaservicosoftware2026
    build:
      context: .
      dockerfile: ./Dockerfile
    command: ["sh", "-c", "pip install debugpy -t /tmp && python /tmp/debugpy --wait-for-client --listen 0.0.0.0:5678 petcare\backend\app\__init__.py "]
    ports:
      - 5678:5678
