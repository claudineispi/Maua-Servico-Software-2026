services:
  db:
    image: postgres:15-alpine
    container_name: petcare_db
    restart: always
    environment:
      POSTGRES_DB: petcare
      POSTGRES_USER: petcare_user
      POSTGRES_PASSWORD: petcare_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petcare_user -d petcare"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: petcare_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://petcare_user:petcare_secret@db:5432/petcare
      SECRET_KEY: "petcare-super-secret-key-change-in-prod"
      ENVIRONMENT: development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    container_name: petcare_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
    name: petcare_pgdata
